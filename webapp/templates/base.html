<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="RAGify – Chat with your documents using AI. Upload PDFs and get accurate, context-aware answers powered by Retrieval-Augmented Generation."/>
  <title>{% block title %}RAGify – AI Document Intelligence{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>
  {% if session.user_id %}
  <nav class="navbar">
    <div class="nav-brand">🤖 RAGify</div>
    <div class="nav-links">
      <span class="nav-user">👤 {{ session.name }}
        <span class="badge {% if session.role == 'admin' %}badge-admin{% else %}badge-user{% endif %}">
          {{ session.role }}
        </span>
      </span>
      <a href="{{ url_for('logout') }}" class="btn btn-outline-sm">Logout</a>
    </div>
  </nav>
  {% endif %}

  <div class="flash-container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
  </div>

  {% block content %}{% endblock %}
</body>
</html>
